{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrimTime{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a href="{% url 'home' %}" class="brand">
                <span class="brand-mark">TT</span>
                <span>
                    <strong>TrimTime</strong>
                    <small>Barbershop navbat xizmati</small>
                </span>
            </a>
            <nav class="main-nav">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'my_bookings' %}">Bronlarim</a>
            </nav>
        </header>

        {% if messages %}
            <section class="alerts">
                {% for message in messages %}
                    <div class="alert {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
